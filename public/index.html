<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Web Wget Pro - Interface de gestion premium">
  <title>Web Wget Pro</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app-container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="logo-wrapper">
        <div class="logo-icon">
          <i class="fas fa-bolt"></i>
        </div>
        <span class="logo-text">WebWget</span>
      </div>

      <nav class="nav-section">
        <div class="nav-label">Gestion</div>
        <a href="#" class="nav-item active" id="navHome">
          <i class="fas fa-house"></i>
          <span>Maison</span>
        </a>
        <a href="#" class="nav-item" id="navDownloads">
          <i class="fas fa-download"></i>
          <span>Actifs</span>
        </a>
        <a href="#" class="nav-item" id="navHistory">
          <i class="fas fa-folder-open"></i>
          <span>Bibliothèque</span>
        </a>
      </nav>

      <nav class="nav-section">
        <div class="nav-label">Configurer</div>
        <a href="#" class="nav-item" id="settingsBtn">
          <i class="fas fa-sliders"></i>
          <span>Réglages</span>
        </a>
        <a href="#" class="nav-item">
          <i class="fas fa-puzzle-piece"></i>
          <span>Extension</span>
        </a>
      </nav>

      <div style="margin-top: auto; padding: 0 12px;">
        <div class="nav-item" style="cursor: default; opacity: 0.8;">
          <div class="indicator indicator-online" id="statusIndicator"></div>
          <span id="statusText">Connecté</span>
        </div>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

      <!-- TOP BAR -->
      <header class="top-bar">
        <div class="page-title" id="pageTitle">Tableau de bord</div>
        <div class="top-actions">
          <button class="btn btn-outline" id="refreshAllBtn">
            <i class="fas fa-sync"></i>
            Actualiser
          </button>
          <button class="btn btn-filled" id="newDownloadBtn">
            <i class="fas fa-plus"></i>
            Nouveau
          </button>
        </div>
      </header>

      <!-- CONTENT BODY -->
      <div class="content-body">

        <!-- NEW DOWNLOAD SECTION -->
        <section id="sectionNew" class="card">
          <div class="card-header">
            <div class="card-title-group">
              <div class="card-icon"><i class="fas fa-plus-circle"></i></div>
              <div>
                <h2 class="card-name">Ajouter un téléchargement</h2>
                <p class="card-description">Collez une URL vidéo, un lien direct ou un magnet.</p>
              </div>
            </div>
            <button class="btn btn-outline btn-analyze" id="analyzeBtn" style="display: none;">
              Analyser les formats
            </button>
          </div>

          <form id="downloadForm">
            <div class="input-wrapper" style="margin-bottom: 20px;">
              <textarea id="urlInput" name="url" class="text-input text-area"
                placeholder="https://www.youtube.com/watch?v=..." required></textarea>
            </div>

            <div id="formatSelection" class="hidden">
              <h3 style="font-size: 0.9rem; margin-bottom: 12px;">Qualités détectées</h3>
              <div id="formatList" class="format-grid"></div>
            </div>

            <div id="advOptions" class="hidden"
              style="margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-subtle);">
              <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
                <div class="input-wrapper">
                  <label style="font-size: 0.75rem; color: var(--text-muted); display: block; margin-bottom: 4px;">Nom
                    personnalisé</label>
                  <input type="text" name="customFilename" class="text-input" placeholder="Optionnel">
                </div>
                <div class="input-wrapper">
                  <label
                    style="font-size: 0.75rem; color: var(--text-muted); display: block; margin-bottom: 4px;">Connexions</label>
                  <input type="number" name="connections" class="text-input" value="16" min="1" max="16">
                </div>
                <div class="input-wrapper">
                  <label
                    style="font-size: 0.75rem; color: var(--text-muted); display: block; margin-bottom: 4px;">User-Agent</label>
                  <input type="text" id="uaInput" name="ua" class="text-input" placeholder="Navigateur par défaut">
                </div>
                <div class="input-wrapper">
                  <label
                    style="font-size: 0.75rem; color: var(--text-muted); display: block; margin-bottom: 4px;">Referer</label>
                  <input type="text" name="referer" class="text-input" placeholder="https://...">
                </div>
                <div class="input-wrapper" style="grid-column: span 2;">
                  <label
                    style="font-size: 0.75rem; color: var(--text-muted); display: block; margin-bottom: 4px;">Cookies
                    (Format Netscape/Raw)</label>
                  <textarea name="cookies" class="text-input"
                    style="height: 60px; font-family: monospace; font-size: 0.8rem;" placeholder="..."></textarea>
                </div>
              </div>
              <div style="margin-top: 16px; display: flex; gap: 20px;">
                <label
                  style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--text-secondary); cursor: pointer;">
                  <input type="checkbox" name="noCheckCert"> Ignorer SSL
                </label>
                <label
                  style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--text-secondary); cursor: pointer;">
                  <input type="checkbox" name="singleSegment"> Segment Unique
                </label>
              </div>
            </div>

            <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 24px;">
              <button type="button" class="btn btn-outline" id="advToggle">
                <i class="fas fa-chevron-down"></i>
                Options avancées
              </button>
              <button type="submit" class="btn btn-filled" id="submitBtn">
                Lancer le téléchargement
              </button>
            </div>
          </form>
        </section>

        <!-- ACTIVE DOWNLOADS SECTION -->
        <div class="section-container" id="sectionActive">
          <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;">
            <h3 style="font-size: 1.1rem; font-weight: 600;">Téléchargements en cours</h3>
            <button class="btn btn-outline btn-danger" id="cancelAllBtn">
              <i class="fas fa-stop"></i>
              Tout arrêter
            </button>
          </div>
          <div id="activeList" class="agents-grid">
            <!-- Items injected by app.js -->
            <div class="card" style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-muted);">
              Aucun téléchargement actif
            </div>
          </div>
        </div>

        <!-- HISTORY SECTION -->
        <div class="section-container hidden" id="sectionHistory" style="margin-top: 40px;">
          <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;">
            <h3 style="font-size: 1.1rem; font-weight: 600;">Bibliothèque</h3>
            <div style="display: flex; gap: 12px;">
              <label
                style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--text-muted);">
                <input type="checkbox" id="keepFilesCheck"> Garder les fichiers
              </label>
              <button class="btn btn-outline" id="clearHistoryBtn">
                Effacer l'historique
              </button>
            </div>
          </div>
          <div id="historyList" class="agents-grid"></div>
        </div>

      </div>
    </main>
  </div>

  <div id="toastContainer" class="toast-container"></div>
  <script src="app.js"></script>
</body>

</html>
